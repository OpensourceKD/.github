name: Copilot Agent (Reusable)

on:
  workflow_call:
    inputs:
      mode:
        required: true
        type: string

jobs:
  copilot-agent:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Debug - Print trigger context
        run: |
          echo "Workflow triggered ✅"
          echo "Mode: ${{ inputs.mode }}"
          echo "Event Name: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref: ${{ github.ref }}"

      - name: 🔍 Debug - Print comment body (if exists)
        run: |
          echo "Comment Body:"
          echo "${{ github.event.comment.body }}"
        continue-on-error: true

      - uses: actions/checkout@v4

      - name: 🚀 Starting Copilot Agent
        run: echo "Starting Copilot Agent with OpenAPI integration..."

      - name: Run Copilot Agent
        uses: github/copilot-agent@v1
        with:
          mode: ${{ inputs.mode }}
          tools: |
            [
              {
                "type": "openapi",
                "name": "core-api",
                "spec_url": "https://noq8dav0ac.execute-api.us-east-1.amazonaws.com/db/api-docs"
              }
            ]

      - name: ✅ Post-run confirmation
        run: echo "Copilot Agent execution completed 🎉"