name: Copilot Agent

on:
  workflow_call:
    inputs:
      mode:
        description: "Agent mode to run (shell-ui | mfe | api-lambda)"
        required: true
        type: string
      prompt_override:
        description: "Optional prompt override (path to .md file in calling repo)"
        required: false
        type: string
        default: ""
      max_retries:
        description: "Maximum number of agent invocations before skipping"
        required: false
        type: string
        default: "3"
    # secrets:
    #   GITHUB_TOKEN:
    #     required: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout calling repository
        uses: actions/checkout@v4
        with:
          path: calling-repo

      - name: Checkout governance repo
        uses: actions/checkout@v4
        with:
          repository: OpensourceKD/.github
          path: governance
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate mode input
        run: |
          case "${{ inputs.mode }}" in
            shell-ui|mfe|api-lambda) echo "Mode: ${{ inputs.mode }}" ;;
            *) echo "Invalid mode: ${{ inputs.mode }}. Must be one of: shell-ui, mfe, api-lambda." && exit 1 ;;
          esac

      - name: Check retry limit
        id: retry_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waka Muku 1: If you see this... its good!"
          MAX="${{ inputs.max_retries }}"
          if [ "${{ github.event_name }}" = "issues" ]; then
            NUMBER="${{ github.event.issue.number }}"
          else
            NUMBER="${{ github.event.number }}"
          fi
          REPO="${{ github.repository }}"
          ATTEMPTS=$(gh api "repos/$REPO/issues/$NUMBER/labels" \
            --jq '[.[] | select(.name | startswith("copilot-agent-attempt-"))] | length')
          if [ "$ATTEMPTS" -ge "$MAX" ]; then
            echo "Max retries ($MAX) reached for #$NUMBER — skipping agent run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            NEXT=$((ATTEMPTS + 1))
            gh api "repos/$REPO/issues/$NUMBER/labels" \
              -X POST --field "labels[]=copilot-agent-attempt-$NEXT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load base prompt
        id: base_prompt
        if: steps.retry_check.outputs.skip != 'true'
        run: |
          BASE=$(cat governance/prompts/base.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$BASE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Load mode prompt
        id: mode_prompt
        if: steps.retry_check.outputs.skip != 'true'
        run: |
          if [ -n "${{ inputs.prompt_override }}" ]; then
            PROMPT_FILE="calling-repo/${{ inputs.prompt_override }}"
          else
            PROMPT_FILE="governance/prompts/modes/${{ inputs.mode }}.md"
          fi
          MODE=$(cat "$PROMPT_FILE")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$MODE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Copilot agent prompt
        if: steps.retry_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_MODE: ${{ inputs.mode }}
          BASE_PROMPT: ${{ steps.base_prompt.outputs.content }}
          MODE_PROMPT: ${{ steps.mode_prompt.outputs.content }}
        run: |
          set -e
          echo "Waka Muku 2: If you see this... its good!"
          if [ "${{ github.event_name }}" = "issues" ]; then
            NUMBER="${{ github.event.issue.number }}"
          else
            NUMBER="${{ github.event.number }}"
          fi
          REPO="${{ github.repository }}"
          {
            printf '@github-copilot\n\n'
            printf '**Agent Mode:** `%s`\n\n---\n\n' "$AGENT_MODE"
            printf '%s\n\n---\n\n' "$BASE_PROMPT"
            printf '%s\n' "$MODE_PROMPT"
          } > /tmp/agent-comment.md
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "$NUMBER" --repo "$REPO" --body-file /tmp/agent-comment.md
          else
            gh issue comment "$NUMBER" --repo "$REPO" --body-file /tmp/agent-comment.md
          fi
